name: Build on Tag

on:
  push:
    tags:
      - 'v*'  # Wird bei jedem Tag der mit v beginnt ausgelöst

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: apps/api
        run: dotnet restore AuraPrintsApi.csproj

      - name: Build API
        working-directory: apps/api
        run: dotnet build AuraPrintsApi.csproj --configuration Release --no-restore

      - name: Build Docker image
        run: docker build --build-arg VERSION=${{ github.ref_name }} .