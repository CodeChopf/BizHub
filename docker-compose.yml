services:
  api:
    build:
      context: .
      args:
        VERSION: ${BIZHUB_VERSION:-dev}
    env_file: .env
    environment:
      - BIZHUB_VERSION=${BIZHUB_VERSION:-dev}
    volumes:
      - bizhub-data:/data
    networks:
      - internal
    restart: unless-stopped
    user: root

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:

volumes:
  bizhub-data:
  caddy-data:
  caddy-config:
